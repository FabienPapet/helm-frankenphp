suite: ServiceAccount
templates:
  - serviceaccount.yaml
tests:
  - it: should not create SA by default
    asserts:
      - hasDocuments:
          count: 0
  - it: should create SA when requested
    set:
      serviceAccount:
        create: true
    asserts:
      - isKind:
          of: ServiceAccount
  - it: should have custom annotations
    set:
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/my-role
