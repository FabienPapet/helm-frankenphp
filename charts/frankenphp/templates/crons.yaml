{{- $cronName := printf "%s" .Release.Name -}}
{{- range .Values.crons }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $cronName }}-{{ .name }}
spec:
  schedule: "{{ .schedule }}"
  successfulJobsHistoryLimit: {{ (default .successfulJobsHistoryLimit 1) }}
  failedJobsHistoryLimit: {{ (default .failedJobsHistoryLimit 3) }}
  {{- if .concurrencyPolicy }}
  concurrencyPolicy: {{ .concurrencyPolicy }}
  {{- end }}
  jobTemplate:
    spec:
      backoffLimit: {{ (default .backoffLimit 0) }}
      template:
        spec:
          {{- with $.Values.serviceAccount }}
          serviceAccountName: {{ include "helm-frankenphp.serviceAccountName" . }}
          {{- end }}
          restartPolicy: {{ (default .restartPolicy "Never") }}
          containers:
            - name: {{ $cronName | lower }}
              image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
              imagePullPolicy: {{ (default .imagePullPolicy "IfNotPresent") }}
              command:
                - "/bin/sh"
                - "-c"
                - {{ .command }};
              {{- if $.Values.resources }}
              resources:
                {{- toYaml $.Values.resources | nindent 16 }}
              {{- end }}
              {{- with $.Values.env }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- with $.Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
